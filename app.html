<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RybářApp – Evidence úlovků a fórum</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #1a5c3a;
    --primary-light: #e8f4ed;
    --primary-mid: #2d7a52;
    --accent: #c8860a;
    --accent-light: #fef3e2;
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede7;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a18;
    --text2: #5a5a55;
    --text3: #8a8a82;
    --danger: #c0392b;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  #app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: var(--surface);
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 40px rgba(0,0,0,0.15);
  }

  /* AUTH */
  .auth-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 48px 28px 32px;
  }
  .auth-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--primary);
    margin-bottom: 8px;
  }
  .auth-logo span { color: var(--accent); }
  .auth-sub {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 48px;
  }
  .auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }
  .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus { border-color: var(--primary); }
  .form-input.error { border-color: var(--danger); }
  .form-error { font-size: 12px; color: var(--danger); margin-top: 4px; }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-mid); }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: #fee; color: var(--danger); border: 1px solid #fcc; }
  .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; border-radius: 8px; }
  .btn:active { transform: scale(0.98); }

  /* TOP NAV */
  .topbar {
    padding: 16px 20px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--primary); }
  .topbar-title span { color: var(--accent); }
  .topbar-user { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 600;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* BOTTOM NAV */
  .bottomnav {
    display: flex;
    border-top: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    bottom: 0;
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 0 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    color: var(--text3);
    font-size: 10px;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--primary); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* CONTENT AREA */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 24px;
  }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
  }

  /* CATCH CARD */
  .catch-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: box-shadow 0.2s;
    cursor: pointer;
  }
  .catch-card:hover { box-shadow: var(--shadow); }
  .catch-icon {
    width: 46px; height: 46px;
    border-radius: 10px;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .catch-info { flex: 1; min-width: 0; }
  .catch-species { font-size: 15px; font-weight: 600; color: var(--text); }
  .catch-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .catch-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--primary-light);
    color: var(--primary);
    flex-shrink: 0;
  }
  .catch-detail { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 600; color: var(--primary); }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* MODAL / FORM SHEET */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 24px 40px;
    width: 100%;
    max-width: 430px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 20px; }

  /* FORUM */
  .forum-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .forum-card:hover { box-shadow: var(--shadow); }
  .forum-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .forum-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .forum-author { font-size: 13px; font-weight: 600; }
  .forum-date { font-size: 11px; color: var(--text3); }
  .forum-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .forum-body { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .forum-footer { display: flex; gap: 12px; margin-top: 10px; align-items: center; }
  .forum-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .tag-tip { background: #e8f4ed; color: var(--primary); }
  .tag-catch { background: #e8f0fe; color: #1a56a3; }
  .tag-gear { background: #fef3e2; color: var(--accent); }
  .tag-disc { background: #f4e8fe; color: #6a2ab0; }
  .forum-likes { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .forum-likes:hover { color: var(--primary); }
  .forum-comments { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; }

  /* PROFILE */
  .profile-hero {
    background: linear-gradient(135deg, var(--primary-light), #fff);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .profile-avatar-big {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .profile-name { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .profile-email { font-size: 13px; color: var(--text2); }
  .profile-role { font-size: 11px; color: var(--primary); font-weight: 600; background: var(--primary-light); padding: 2px 8px; border-radius: 5px; display: inline-block; margin-top: 4px; }

  .list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item-icon { font-size: 18px; margin-right: 12px; }
  .list-item-label { color: var(--text); flex: 1; }
  .list-item-value { color: var(--text2); font-size: 13px; }

  /* DETAIL VIEW */
  .detail-header {
    background: var(--primary-light);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .detail-fish-icon { font-size: 48px; margin-bottom: 8px; }
  .detail-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--primary); }
  .detail-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .detail-field { background: var(--surface2); border-radius: 10px; padding: 12px; }
  .detail-field-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 4px; }
  .detail-field-value { font-size: 15px; font-weight: 500; color: var(--text); }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--primary);
    font-family: inherit;
    font-weight: 500;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  /* FORUM DETAIL */
  .comment {
    display: flex;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .comment:last-child { border-bottom: none; }
  .comment-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .comment-body { font-size: 13px; line-height: 1.5; color: var(--text); }
  .comment-meta { font-size: 11px; color: var(--text3); margin-top: 3px; }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .empty-sub { font-size: 13px; }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 500;
    animation: fadeInOut 2.5s ease forwards;
    white-space: nowrap;
  }
  @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 75%{opacity:1} 100%{opacity:0} }

  .select-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    outline: none;
    appearance: none;
    cursor: pointer;
  }
  .select-input:focus { border-color: var(--primary); }

  textarea.form-input { resize: vertical; min-height: 80px; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
  }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* ENCYCLOPEDIA */
  .encyc-search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }
  .encyc-search input {
    border: none;
    background: none;
    outline: none;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    flex: 1;
  }
  .encyc-search input::placeholder { color: var(--text3); }

  .fish-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
.fish-card {
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    background: white;
  }

  .fish-card:hover { 
    transform: translateY(-2px); 
    box-shadow: var(--shadow); 
  }

  .fish-card-top {
    height: 150px; 
    padding: 18px 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex-shrink: 0;
  }

  .fish-card-top img {
    max-width: 100%;
    max-height: 80px;
    object-fit: contain;
    margin-bottom: 8px;
  }

  .fish-image-big { 
    font-size: 36px; 
    margin-bottom: 6px; 
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fish-card-name { 
    font-size: 14px; 
    font-weight: 600; 
    line-height: 1.2;
  }

  .fish-card-latin { 
    font-size: 10px; 
    font-style: italic; 
    margin-top: 2px; 
    opacity: 0.65; 
  }

  .fish-card-bottom {
    margin-top: auto; 
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(0,0,0,0.07);
    background: rgba(0,0,0,0.02);
  }
  .fish-mira-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 6px;
    letter-spacing: 0.2px;
  }
  .fish-difficulty {
    display: flex;
    gap: 2px;
  }
  .diff-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* FISH DETAIL */
  .fish-detail-hero {
    border-radius: var(--radius);
    padding: 24px 16px 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .fish-detail-image { font-size: 56px; margin-bottom: 8px; }
  .fish-detail-name { font-family: 'DM Serif Display', serif; font-size: 26px; }
  .fish-detail-latin { font-size: 13px; font-style: italic; margin-top: 3px; opacity: 0.7; }

  .info-section { margin-bottom: 16px; }
  .info-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .info-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text3); margin-bottom: 3px; }
  .info-box-val { font-size: 14px; font-weight: 600; color: var(--text); }

  .bait-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .bait-chip {
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    background: var(--primary-light);
    color: var(--primary);
  }
  .season-bar {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 2px;
    border-radius: 6px;
    overflow: hidden;
  }
  .season-month {
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 600;
  }
  .season-month.active { background: var(--primary); color: #fff; }
  .season-month.closed { background: var(--surface2); color: var(--text3); }
  .season-month.partial { background: var(--accent-light); color: var(--accent); }

  .fact-box {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const FISH_EMOJI = { 'Kapr': '🎣', 'Štika': '🐟', 'Pstruh': '🐠', 'Candát': '🦈', 'Sumec': '🐡', 'Lín': '🐟', 'Okoun': '🐟', 'Cejn': '🐟' };

  {

// STATE
let state = {
  loggedUser: null,
  screen: 'login',
  tab: 'catches',
  modal: null,
  modalData: null,
  toast: null,
  catchFilter: 'Vše',
  forumFilter: 'Vše',
  encycSearch: '',
  encycFish: null,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// AUTH
function login(email, password) {
  const user = DB.users.find(u => u.email === email && u.password === password);
  if (!user) return false;
  setState({ loggedUser: user, screen: 'main', tab: 'catches' });
  return true;
}

function register(name, email, password) {
  if (DB.users.find(u => u.email === email)) return false;
  const user = { id: DB.users.length + 1, name, email, password, role: 'Rybář' };
  DB.users.push(user);
  setState({ loggedUser: user, screen: 'main', tab: 'catches' });
  return true;
}

function logout() {
  setState({ loggedUser: null, screen: 'login' });
}

// CATCHES
function getUserCatches() {
  return DB.catches.filter(c => c.userId === state.loggedUser.id).sort((a,b) => new Date(b.date) - new Date(a.date));
}

function addCatch(data) {
  const c = { id: nextId.catch++, userId: state.loggedUser.id, ...data };
  DB.catches.push(c);
  showToast('Úlovek byl zaznamenán ✓');
  setState({ modal: null });
}

// POSTS
function getPosts() {
  return [...DB.posts].sort((a,b) => new Date(b.date) - new Date(a.date));
}

function addPost(data) {
  const p = { id: nextId.post++, userId: state.loggedUser.id, likes: 0, date: new Date().toISOString().slice(0,10), ...data };
  DB.posts.push(p);
  showToast('Příspěvek byl přidán ✓');
  setState({ modal: null });
}

function addComment(postId, body) {
  const c = { id: nextId.comment++, postId, userId: state.loggedUser.id, body, date: new Date().toISOString().slice(0,10) };
  DB.comments.push(c);
  render();
}

function toggleLike(postId) {
  const post = DB.posts.find(p => p.id === postId);
  if (!post) return;
  if (likedPosts.has(postId)) { post.likes--; likedPosts.delete(postId); }
  else { post.likes++; likedPosts.add(postId); }
  render();
}

// HELPERS
function getUserById(id) { return DB.users.find(u => u.id === id) || { name: 'Neznámý', email: '' }; }
function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2); }
function formatDate(d) {
  const date = new Date(d);
  return date.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'short', year: 'numeric' });
}
function tagClass(cat) {
  return { 'Tipy': 'tag-tip', 'Úlovky': 'tag-catch', 'Vybavení': 'tag-gear', 'Diskuse': 'tag-disc' }[cat] || 'tag-disc';
}
function fishEmoji(species) { return FISH_EMOJI[species] || '🐟'; }
function fmtWeight(g) { return g >= 1000 ? (g/1000).toFixed(2) + ' kg' : g + ' g'; }

let currentAuthTab = 'login';
function switchAuthTab(tab) {
  currentAuthTab = tab;
  document.getElementById('tab-login').className = 'auth-tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-register').className = 'auth-tab' + (tab === 'register' ? ' active' : '');
  document.getElementById('auth-form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('auth-form-register').style.display = tab === 'register' ? '' : 'none';
}

function attachAuth() {}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  if (!login(email, pw)) {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pw = document.getElementById('reg-password').value;
  if (!name || !email || pw.length < 6) { showToast('Vyplňte všechna pole'); return; }
  if (!register(name, email, pw)) {
    document.getElementById('reg-error').style.display = 'block';
  }
}

function renderCatches() {
  const catches = getUserCatches();
  const totalWeight = catches.reduce((s, c) => s + c.weightG, 0);
  const filters = ['Vše', ...FISH_SPECIES.filter(s => catches.find(c => c.species === s))];
  const filtered = state.catchFilter === 'Vše' ? catches : catches.filter(c => c.species === state.catchFilter);

  return `
  <div class="section-header">
    <div class="section-title">Moje úlovky</div>

  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val">${catches.length}</div><div class="stat-lbl">Celkem</div></div>
    <div class="stat-card"><div class="stat-val">${fmtWeight(totalWeight)}</div><div class="stat-lbl">Celková váha</div></div>
    <div class="stat-card"><div class="stat-val">${catches.length ? fmtWeight(Math.max(...catches.map(c=>c.weightG))) : '–'}</div><div class="stat-lbl">Největší</div></div>

  <div class="chip-row">
    ${filters.map(f => `<div class="chip ${state.catchFilter===f?'active':''}" onclick="setState({catchFilter:'${f}'})">${f}</div>`).join('')}

      <div class="catch-badge">${fmtWeight(c.weightG)}</div>
    </div>`).join('')}`;
}

    <div class="list-item"><span class="list-item-icon">✉️</span><span class="list-item-label">E-mail</span><span class="list-item-value">${user.email}</span></div>
    <div class="list-item"><span class="list-item-icon">🏆</span><span class="list-item-label">Role</span><span class="list-item-value">${user.role}</span></div>
  </div>
  <button class="btn btn-danger" onclick="logout()">Odhlásit se</button>`;
}

function renderCatchDetail() {
  const c = DB.catches.find(c => c.id === state.modalData);
  if (!c) return '';
  return `<div class="modal-overlay" onclick="if(event.target===this)setState({modal:null})">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="back-btn" onclick="setState({modal:null})">← Zpět</button>
    <div class="detail-header">
      <div class="detail-fish-icon">${fishEmoji(c.species)}</div>
      <div class="detail-title">${c.species}</div>
      <div class="detail-sub">${formatDate(c.date)} v ${c.time}</div>
    </div>
    <div class="detail-grid">
      <div class="detail-field"><div class="detail-field-label">Váha</div><div class="detail-field-value">${fmtWeight(c.weightG)}</div></div>
      <div class="detail-field"><div class="detail-field-label">Délka</div><div class="detail-field-value">${c.lengthCm} cm</div></div>
      <div class="detail-field"><div class="detail-field-label">Nástraha</div><div class="detail-field-value">${c.bait}</div></div>
      <div class="detail-field"><div class="detail-field-label">Čas</div><div class="detail-field-value">${c.time}</div></div>
    </div>
    <div class="detail-field" style="border-radius:10px;background:var(--surface2);padding:12px;margin-bottom:16px">
      <div class="detail-field-label">Revír</div>
      <div class="detail-field-value">${c.revir}</div>
    </div>
    ${c.note ? `<div class="detail-field" style="border-radius:10px;background:var(--surface2);padding:12px">
      <div class="detail-field-label">Poznámka</div>
      <div class="detail-field-value">${c.note}</div>
    </div>` : ''}
  </div></div>`;
}

function renderPostDetail() {
  const p = DB.posts.find(p => p.id === state.modalData);
  if (!p) return '';
  const author = getUserById(p.userId);
  const comments = DB.comments.filter(c => c.postId === p.id);
  return `<div class="modal-overlay" onclick="if(event.target===this)setState({modal:null})">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="back-btn" onclick="setState({modal:null})">← Zpět</button>
    <div class="forum-header" style="margin-bottom:12px">
      <div class="forum-avatar">${getInitials(author.name)}</div>
      <div><div class="forum-author">${author.name}</div><div class="forum-date">${formatDate(p.date)}</div></div>
      <span class="forum-tag ${tagClass(p.category)}" style="margin-left:auto">${p.category}</span>
    </div>
    <div class="forum-title" style="font-size:18px;margin-bottom:12px">${p.title}</div>
    <div class="forum-body" style="font-size:14px;line-height:1.7">${p.body}</div>
    <div class="forum-footer" style="margin-bottom:20px">
      <div class="forum-likes" onclick="toggleLike(${p.id})">${likedPosts.has(p.id)?'❤️':'🤍'} ${p.likes} líbí se</div>
    </div>
    <div class="divider"></div>
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">Komentáře (${comments.length})</div>
    ${comments.length === 0 ? '<div style="color:var(--text3);font-size:13px;margin-bottom:16px">Zatím žádné komentáře</div>' :
      comments.map(c => {
        const u = getUserById(c.userId);
        return `<div class="comment">
          <div class="comment-avatar">${getInitials(u.name)}</div>
          <div><div class="comment-body">${c.body}</div><div class="comment-meta">${u.name} · ${formatDate(c.date)}</div></div>
        </div>`;
      }).join('')}
    <div style="display:flex;gap:8px;margin-top:12px">
      <input class="form-input" id="new-comment" placeholder="Přidat komentář…" style="flex:1">
      <button class="btn btn-primary btn-sm" onclick="submitComment(${p.id})">Odeslat</button>
    </div>
  </div></div>`;
}

function submitComment(postId) {
  const input = document.getElementById('new-comment');
  const body = input.value.trim();
  if (!body) return;
  addComment(postId, body);
  showToast('Komentář přidán ✓');
}

function renderAddCatchModal() {
  return `<div class="modal-overlay" onclick="if(event.target===this)setState({modal:null})">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Zaznamenat úlovek</div>
    <div class="form-group">
      <label class="form-label">Druh ryby *</label>
      <select class="select-input" id="c-species">
        ${FISH_SPECIES.map(s => `<option>${s}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Váha (g) *</label>
        <input class="form-input" id="c-weight" type="number" placeholder="3200" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Délka (cm)</label>
        <input class="form-input" id="c-length" type="number" placeholder="58" min="1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Revír *</label>
      <select class="select-input" id="c-revir">
        ${REVIRY.map(r => `<option>${r}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Datum *</label>
        <input class="form-input" id="c-date" type="date" value="${new Date().toISOString().slice(0,10)}">
      </div>
      <div class="form-group">
        <label class="form-label">Čas</label>
        <input class="form-input" id="c-time" type="time" value="${new Date().toTimeString().slice(0,5)}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Nástraha</label>
      <input class="form-input" id="c-bait" type="text" placeholder="Kukuřice, wobler…">
    </div>
    <div class="form-group">
      <label class="form-label">Poznámka</label>
      <textarea class="form-input" id="c-note" placeholder="Volitelná poznámka…"></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-secondary" style="flex:1" onclick="setState({modal:null})">Zrušit</button>
      <button class="btn btn-primary" style="flex:2" onclick="submitCatch()">Zaznamenat úlovek</button>
    </div>
  </div></div>`;
}

function submitCatch() {
  const species = document.getElementById('c-species').value;
  const weightG = parseInt(document.getElementById('c-weight').value);
  const lengthCm = parseInt(document.getElementById('c-length').value) || 0;
  const revir = document.getElementById('c-revir').value;
  const date = document.getElementById('c-date').value;
  const time = document.getElementById('c-time').value || '00:00';
  const bait = document.getElementById('c-bait').value.trim();
  const note = document.getElementById('c-note').value.trim();
  if (!weightG || weightG < 1) { showToast('Zadejte váhu úlovku'); return; }
  if (!date) { showToast('Zadejte datum'); return; }
  addCatch({ species, weightG, lengthCm, revir, date, time, bait: bait || 'Neuvedeno', note });
}

function renderAddPostModal() {
  return `<div class="modal-overlay" onclick="if(event.target===this)setState({modal:null})">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Nový příspěvek</div>
    <div class="form-group">
      <label class="form-label">Kategorie</label>
      <select class="select-input" id="p-category">
        ${FORUM_CATS.map(c => `<option>${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Nadpis *</label>
      <input class="form-input" id="p-title" type="text" placeholder="O čem chcete psát?">
    </div>
    <div class="form-group">
      <label class="form-label">Text příspěvku *</label>
      <textarea class="form-input" id="p-body" style="min-height:120px" placeholder="Napište svůj příspěvek…"></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-secondary" style="flex:1" onclick="setState({modal:null})">Zrušit</button>
      <button class="btn btn-primary" style="flex:2" onclick="submitPost()">Přidat příspěvek</button>
    </div>
  </div></div>`;
}

function submitPost() {
  const category = document.getElementById('p-category').value;
  const title = document.getElementById('p-title').value.trim();
  const body = document.getElementById('p-body').value.trim();
  if (!title || !body) { showToast('Vyplňte nadpis i text'); return; }
  addPost({ category, title, body });
}

function renderEncyc() {
  if (state.encycFish) return renderFishDetail(state.encycFish);

  const q = state.encycSearch.toLowerCase().trim();
  const filtered = FISH_DB.filter(f =>
    !q || f.name.toLowerCase().includes(q) || f.latin.toLowerCase().includes(q)
  );

  const MONTHS = ['L','Ú','B','D','K','Č','S','S','Z','Ř','L','P'];

  function diffDots(n, color) {
    return Array.from({length: 5}, (_,i) =>
      `<div class="diff-dot" style="background:${i < n ? color : 'var(--border)'}"></div>`
    ).join('');
  }

  return `
  <div class="section-header">
    <div class="section-title">Encyklopedie ryb</div>
    <span style="font-size:12px;color:var(--text3)">${filtered.length} druhů</span>
  </div>
  <div class="encyc-search">
    <span style="font-size:16px">🔍</span>
    <input placeholder="Hledat rybu…" value="${state.encycSearch}"
      oninput="state.encycSearch=this.value;render()" id="encyc-input">
  </div>
  <div class="fish-grid">
    ${filtered.map(f => `
    <div class="fish-card" onclick="setState({encycFish:'${f.id}'})">
      <div class="fish-card-top" style="background:${f.colorLight}">
        <div class="fish-image-big"><img src="${f.image}" alt="${f.name}" style="width: 100%; height: 100%; object-fit: contain;"></div>
        <div class="fish-card-name" style="color:${f.colorText}">${f.name}</div>
        <div class="fish-card-latin" style="color:${f.colorText}">${f.latin}</div>
      </div>
      <div class="fish-card-bottom">
        <div class="fish-mira-badge" style="background:${f.colorLight};color:${f.colorText}">
          ${f.id === 'jeseter' ? 'CHRÁNĚNÁ' : `MÍR: ${f.mira} cm`}
        </div>
        <div class="fish-difficulty" title="Obtížnost lovu">
          ${diffDots(f.difficulty, f.color)}
        </div>
      </div>
    </div>`).join('')}
  </div>
  ${filtered.length === 0 ? `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Ryba nenalezena</div></div>` : ''}
  `;
}

function renderFishDetail(fishId) {
  const f = FISH_DB.find(x => x.id === fishId);
  if (!f) return '';
  const MONTHS_LABELS = ['Led','Úno','Bře','Dub','Kvě','Čer','Čvc','Srp','Zář','Říj','Lis','Pro'];

  function diffDots(n, color) {
    return Array.from({length: 5}, (_,i) =>
      `<div class="diff-dot" style="background:${i < n ? color : 'var(--border)'};width:9px;height:9px"></div>`
    ).join('');
  }

  return `
  <button class="back-btn" onclick="setState({encycFish:null})">← Zpět na seznam</button>

  <div class="fish-detail-hero" style="background:${f.colorLight}">
    <div class="fish-detail-image">
      <img src="${f.image}" alt="${f.name}" style="width: 100%; max-height: 200px; object-fit: contain;">
    </div>
    <div class="fish-detail-name" style="color:${f.colorText}">${f.name}</div>
    <div class="fish-detail-latin" style="color:${f.colorText}">${f.latin}</div>
  </div>

  <div class="info-section">
    <div class="info-section-title">Základní údaje</div>
    <div class="info-grid">
      <div class="info-box">
        <div class="info-box-label">Zákonná míra</div>
        <div class="info-box-val" style="color:${f.id==='jeseter'?'var(--danger)':f.color}">
          ${f.id === 'jeseter' ? '⚠️ Chráněná' : f.mira + ' cm'}
        </div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Max. hmotnost</div>
        <div class="info-box-val">až ${f.maxKg} kg</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Max. délka</div>
        <div class="info-box-val">až ${f.maxCm} cm</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Obtížnost lovu</div>
        <div class="fish-difficulty" style="margin-top:4px">${diffDots(f.difficulty, f.color)}</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Hloubka</div>
        <div class="info-box-val" style="font-size:12px">${f.hloubka}</div>
      </div>
      <div class="info-box">
        <div class="info-box-label">Proud</div>
        <div class="info-box-val" style="font-size:12px">${f.rychlost}</div>
      </div>
    </div>
  </div>

  <div class="info-section">
    <div class="info-section-title">Popis</div>
    <div style="font-size:14px;line-height:1.7;color:var(--text2)">${f.popis}</div>
  </div>

  <div class="info-section">
    <div class="info-section-title">Stanoviště</div>
    <div style="font-size:14px;color:var(--text2)">${f.habitat}</div>
  </div>

  <div class="info-section">
    <div class="info-section-title">Doporučené nástrahy</div>
    <div class="bait-list">
      ${f.nastrahy.map(n => `<div class="bait-chip" style="background:${f.colorLight};color:${f.colorText}">${n}</div>`).join('')}
    </div>
  </div>

  <div class="info-section">
    <div class="info-section-title">Lovná sezóna</div>
    <div class="season-bar">
      ${f.sezona.map((active, i) => `
        <div class="season-month ${active ? 'active' : 'closed'}"
          style="${active ? `background:${f.color}` : ''}">
          ${MONTHS_LABELS[i].slice(0,1)}
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--text3)">
      <span style="display:flex;align-items:center;gap:4px">
        <span style="width:10px;height:10px;border-radius:2px;background:${f.color};display:inline-block"></span> Lovná doba
      </span>
      <span style="display:flex;align-items:center;gap:4px">
        <span style="width:10px;height:10px;border-radius:2px;background:var(--surface2);border:1px solid var(--border);display:inline-block"></span> Hájení
      </span>
    </div>
  </div>

  <div class="info-section">
    <div class="info-section-title">Rekord</div>
    <div style="font-size:14px;color:var(--text2)">🏆 ${f.zaznam}</div>
  </div>

  <div class="info-section">
    <div class="info-section-title">Tip pro rybáře</div>
    <div class="fact-box">${f.tip}</div>
  </div>
  `;
}

function attachMain() {}

render();
</script>
</body>
</html>
